# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
# fail_fast: true
minimum_pre_commit_version: 1.18.1
exclude: "docs/_build/"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ".(md|rst)$"
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 38980559e3a605691d6579f96222c30778e5a69e  # frozen: 3.0.0
    hooks:
      - id: git-check # Configure in .gitattributes
        exclude: ".claude"
      - id: shellcheck
        exclude: ".bats$|zsh"
      - id: shfmt
        exclude: ".bats$"
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8  # frozen: v1.5.6
    hooks:
      # - id: forbid-crlf
      - id: remove-crlf
        exclude: ".bat$"
  - repo: https://github.com/tillig/json-sort-cli
    rev: bebc23fb67e900976bc570c2024ccd4f9faba626 # frozen: v3.0.1
    hooks:
      - id: json-sort
        args:
          - --autofix
  - repo: local
    hooks:
      - id: shell-commons-bash-zsh-syntax
        name: Check shell_commons syntax in both bash and zsh
        entry: bash -c 'for f in "$@"; do bash -n "$f" && zsh -n "$f"; done' --
        language: system
        files: ^home/\.shell_commons/.*\.sh$
